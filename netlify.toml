[build]
  command = "npm run build"
  publish = "dist"

# Firebase web API keys are public client-side identifiers (security comes from
# Firestore rules, not key obscurity). Tell Netlify's scanner to skip smart detection.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Sprint 1 Contact Hub — every request reaching the hub.wileyfor21.com host is
# served the standalone hub.html. Aaron must add hub.wileyfor21.com as a domain
# alias in Netlify and create the CNAME at the registrar before this resolves.
[[redirects]]
  from = "/*"
  to = "/hub.html"
  status = 200
  force = true
  conditions = {Host = ["hub.wileyfor21.com"]}

