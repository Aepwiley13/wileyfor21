[build]
  command = "npm run build"
  publish = "dist"

# Firebase web API keys are public client-side identifiers (security comes from
# Firestore rules, not key obscurity). Tell Netlify's scanner to skip smart detection.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/signup"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/volunteer"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/volunteer/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/survey/*"
  to = "/app.html"
  status = 200
