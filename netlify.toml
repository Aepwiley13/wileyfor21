[build]
  command = "npm run build"
  publish = "dist"

# Firebase web API keys are public client-side identifiers (security comes from
# Firestore rules, not key obscurity). Tell Netlify's scanner to skip smart detection.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/caucus"
  to = "/caucus.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/volunteer"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/volunteer/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/survey/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/delegate/survey"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/delegate/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/delegate/signup"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/delegate/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/delegate/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/endorse"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/endorsements"
  to = "/app.html"
  status = 200
